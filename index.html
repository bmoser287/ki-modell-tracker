<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top KI-Frontier-Modelle Benchmark</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 15px; background-color: #ffffff; color: #2d3748; }
        .container { max-width: 100%; margin: 0 auto; }
        h2 { color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 6px; font-size: 1.2rem; margin-top: 25px; margin-bottom: 12px; }
        .update-bar { background: #edf2f7; padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; color: #4a5568; margin-bottom: 15px; display: inline-block; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.9rem; text-align: left; }
        th { background-color: #f7fafc; color: #4a5568; font-weight: 600; padding: 10px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
        tr:hover { background-color: #f8fafc; }
        .badge-free { background-color: #c6f6d5; color: #22543d; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }
        .speed-tag { color: #2b6cb0; font-weight: 600; }
        .empty-msg { color: #a0aec0; font-style: italic; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="update-bar" id="updateInfo">🔄 Lade aktuellste KI-Preise & Benchmarks...</div>

    <h2>💰 Top Bezahl-Frontier-Modelle (nach Schnelligkeit)</h2>
    <table>
        <thead>
            <tr>
                <th>Rang</th>
                <th>Modellname</th>
                <th>Input (1M Tokens)</th>
                <th>Output (1M Tokens)</th>
                <th>Antwortzeit</th>
            </tr>
        </thead>
        <tbody id="paidModelsTable"></tbody>
    </table>

    <h2>🎁 Top Kostenlose & Open-Source Modelle</h2>
    <table>
        <thead>
            <tr>
                <th>Rang</th>
                <th>Modellname</th>
                <th>Preis</th>
                <th>Antwortzeit</th>
            </tr>
        </thead>
        <tbody id="freeModelsTable"></tbody>
    </table>
</div>

<script>
    // Lädt die von GitHub Actions erzeugte live modelle.json
    fetch('modelle.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('updateInfo').innerHTML = '✅ Live-Daten von OpenRouter | Automatisch sortiert';

            const paidTable = document.getElementById('paidModelsTable');
            const freeTable = document.getElementById('freeModelsTable');

            let paidRank = 1;
            let freeRank = 1;

            data.forEach(m => {
                if (m.kategorie === 'bezahlmodell') {
                    // Maximal 10 Bezahlmodelle anzeigen
                    if (paidRank <= 10) {
                        paidTable.innerHTML += `
                            <tr>
                                <td><b>#${paidRank++}</b></td>
                                <td><b>${m.name}</b></td>
                                <td>$${m.input_preis.toFixed(3)}</td>
                                <td>$${m.output_preis.toFixed(3)}</td>
                                <td><span class="speed-tag">⚡ ${m.latenz_ms} ms</span></td>
                            </tr>`;
                    }
                } else {
                    // Maximal 10 Kostenlose Modelle anzeigen
                    if (freeRank <= 10) {
                        freeTable.innerHTML += `
                            <tr>
                                <td><b>#${freeRank++}</b></td>
                                <td><b>${m.name}</b></td>
                                <td><span class="badge-free">Kostenlos</span></td>
                                <td><span class="speed-tag">⚡ ${m.latenz_ms} ms</span></td>
                            </tr>`;
                    }
                }
            });

            if (paidRank === 1) paidTable.innerHTML = '<tr><td colspan="5" class="empty-msg">Keine Bezahlmodelle gefunden.</td></tr>';
            if (freeRank === 1) freeTable.innerHTML = '<tr><td colspan="4" class="empty-msg">Keine kostenlosen Modelle gefunden.</td></tr>';
        })
        .catch(err => {
            document.getElementById('updateInfo').innerHTML = '⚠️ Fehler beim Laden der Daten.';
            console.error(err);
        });
</script>

</body>
</html>
